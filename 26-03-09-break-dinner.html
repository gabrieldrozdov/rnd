<style>
	body {
		margin: 0;
	}
	canvas {
		width: 100%;
		height: 100%;
	}
</style>

<script src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/p5.min.js"></script>

<script>
	let font;
	let i = 500;
	let inputString = "Aa";

	function preload() {
		font = loadFont('https://toomuchtype.com/fonts/limkin/variable/TMT-LimkinVF.ttf');
	}

	function setup() {
		createCanvas(windowWidth, windowHeight);
		strokeWeight(1);
	}

	function draw() {
		background(255);

		textSize(i);
		let w = textWidth(inputString);

		let percentX = mouseX/windowWidth;
		let percentY = mouseY/windowHeight;

		frameRate(round(percentY*55)+5)

		let points = font.textToPoints(
			inputString,
			windowWidth/2 - w/2,
			windowHeight/2 + i/3,
			i,
			{ sampleFactor:  0.1*percentX }
		);

		for (let p of points) {
			let randomPoint = random(points);
			line(
				p.x, p.y,
				randomPoint.x, randomPoint.y
			)
		}
	}

	function windowResized() {
		resizeCanvas(windowWidth, windowHeight);
	}
</script>
