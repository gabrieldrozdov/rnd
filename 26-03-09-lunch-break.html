<style>
	body {
		margin: 0;
	}
	canvas {
		width: 100%;
		height: 100%;
	}
</style>

<script src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/p5.min.js"></script>

<script>
	let i=0;
	function setup() {
		createCanvas(windowWidth, windowHeight);
		strokeWeight(.5);
		noFill();
	}

	function draw() {
		triangle(
			random(0+i, windowWidth-i), random(0+i, windowHeight-i),
			random(0+i, windowWidth-i), random(0+i, windowHeight-i),
			random(0+i, windowWidth-i), random(0+i, windowHeight-i)
			);
		i += windowWidth/100;
		if (i > windowWidth) {
			i = 0;
		}
	}

	function windowResized() {
		resizeCanvas(windowWidth, windowHeight);
	}
</script>
